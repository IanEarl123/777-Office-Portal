<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Office Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen">

  <!-- Header -->
  <div class="bg-white shadow-sm">
    <div class="max-w-6xl mx-auto px-4 py-5">
      <h1 class="text-2xl font-bold text-slate-800">🏢 777 Office Portal</h1>
      <p class="text-slate-500 text-sm">Quick Access System</p>
    </div>
  </div>

  <!-- Main Content -->
  <div class="max-w-6xl mx-auto p-5">

    <div class="grid grid-cols-2 md:grid-cols-4 gap-5">

      <!-- Attendance Tracker -->
      <a href="https://forms.cloud.microsoft/r/jLpZFYSkwK" target="_blank"
         class="bg-white rounded-2xl p-6 shadow-md hover:shadow-xl hover:-translate-y-1 transition duration-300 text-center">
        <div class="text-4xl mb-4">📊</div>
        <h2 class="font-semibold text-slate-700">Attendance Tracker</h2>
        <p class="text-sm text-slate-500 mt-2">Daily Monitoring</p>
      </a>

      <!-- Tarkie Request -->
      <a href="https://forms.cloud.microsoft/r/1RPRSPc2wH" target="_blank"
         class="bg-white rounded-2xl p-6 shadow-md hover:shadow-xl hover:-translate-y-1 transition duration-300 text-center">
        <div class="text-4xl mb-4">T</div>
        <h2 class="font-semibold text-slate-700">Tarkie Credential Request</h2>
        <p class="text-sm text-slate-500 mt-2">Daily Monitoring</p>
      </a>

      <!-- Absent Request -->
      <a href="https://forms.gle/r5cJFJpyeTHyQv5F8" target="_blank"
         class="bg-white rounded-2xl p-6 shadow-md hover:shadow-xl hover:-translate-y-1 transition duration-300 text-center">
        <div class="text-4xl mb-4">📅</div>
        <h2 class="font-semibold text-slate-700">Absent Request</h2>
        <p class="text-sm text-slate-500 mt-2">Leave Application</p>
      </a>

      <!-- Change Schedule -->
      <a href="https://forms.cloud.microsoft/r/r4ukqepnuh" target="_blank"
         class="bg-white rounded-2xl p-6 shadow-md hover:shadow-xl hover:-translate-y-1 transition duration-300 text-center">
        <div class="text-4xl mb-4">🔄</div>
        <h2 class="font-semibold text-slate-700">Change Schedule</h2>
        <p class="text-sm text-slate-500 mt-2">Shift Adjustment</p>
      </a>

      <!-- Inventory Tracker -->
      <a href="https://forms.cloud.microsoft/r/GbhELPxj3X" target="_blank"
         class="bg-white rounded-2xl p-6 shadow-md hover:shadow-xl hover:-translate-y-1 transition duration-300 text-center">
        <div class="text-4xl mb-4">📦</div>
        <h2 class="font-semibold text-slate-700">Inventory Tracker</h2>
        <p class="text-sm text-slate-500 mt-2">Stock Monitoring</p>
      </a>

    </div>

  </div>

</body>
</html>
